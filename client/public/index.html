<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Welcome</title>
        <style>
            :root {
                --bg-color: #1e1e1e;
                --text-color: #e0e0e0;
                --input-bg: #333;
                --input-text: #e0e0e0;
                --button-bg: #444;
                --button-text: #e0e0e0;
                --output-bg: #2d2d2d;
                --output-border: #444;
            }
            .light-mode {
                --bg-color: #ffffff;
                --text-color: #333;
                --input-bg: #f0f0f0;
                --input-text: #333;
                --button-bg: #e0e0e0;
                --button-text: #333;
                --output-bg: #f9f9f9;
                --output-border: #ccc;
            }
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
                background-color: var(--bg-color);
                color: var(--text-color);
                transition:
                    background-color 0.3s,
                    color 0.3s;
            }
            #output {
                width: 100%;
                height: 33vh;
                border: 1px solid var(--output-border);
                padding: 10px;
                box-sizing: border-box;
                overflow-y: auto;
                white-space: pre-wrap;
                background-color: var(--output-bg);
                color: var(--text-color);
                margin-bottom: 10px;
            }
            #inputContainer {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            #inputField {
                width: 100%;
                padding: 8px;
                background-color: var(--input-bg);
                color: var(--input-text);
                border: 1px solid var(--output-border);
                box-sizing: border-box;
            }
            #submitButton {
                padding: 8px 15px;
                background-color: var(--button-bg);
                color: var(--button-text);
                border: 1px solid var(--output-border);
                cursor: pointer;
                align-self: flex-start;
            }
            #themeToggle {
                padding: 8px 15px;
                background-color: var(--button-bg);
                color: var(--button-text);
                border: 1px solid var(--output-border);
                cursor: pointer;
            }
            #themeToggle {
                position: fixed;
                bottom: 20px;
                right: 20px;
            }
        </style>
    </head>
    <body>
        <h1>Denethor</h1>
        <p>Your online CLI platform:</p>
        <div id="output"></div>
        <div id="inputContainer">
            <input type="text" id="inputField" placeholder="Enter text here" />
            <button id="submitButton">Submit</button>
        </div>
        <button id="themeToggle">Toggle Light/Dark</button>

        <script>
            const output = document.getElementById("output");
            const inputField = document.getElementById("inputField");
            const submitButton = document.getElementById("submitButton");
            const themeToggle = document.getElementById("themeToggle");
            const body = document.body;
            const MAX_LINES = 50;

            let outputLines = [];

            function updateOutputLDisplay() {
                output.textContent = outputLines.join("\n");
                output.scrollTop = output.scrollHeight;
            }

            function appendToOutput(text) {
                outputLines.push(text);
                if (outputLines.length > MAX_LINES) {
                    outputLines = outputLines.slice(-MAX_LINES);
                }
                updateOutputLDisplay();
            }

            submitButton.addEventListener("click", () => {
                const inputText = inputField.value;
                if (inputText.trim() !== "") {
                    appendToOutput(">> " + inputText);
                    inputField.value = "";
                }
                output.dispatchEvent(new Event("outputUpdated"));
            });

            inputField.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    submitButton.click();
                }
            });

            themeToggle.addEventListener("click", () => {
                body.classList.toggle("light-mode");
            });

            window.printToOutput = function (text) {
                appendToOutput("<< " + text);
                output.dispatchEvent(new Event("outputUpdated"));
            };

            window.clearOutput = function () {
                outputLines = [];
                updateOutputLDisplay();
            };

            function printToPage(text) {
                window.printToOutput(text);
            }

            async function handleOutputUpdate() {
                const lastLine = outputLines[outputLines.length - 1];
                // API call to backend
                if (lastLine.startsWith(">>")) {
                    try {
                        var input = lastLine.split(">> ")[1];
                        const response = await fetch(
                            `http://localhost:8080/api/console`,
                            {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ input }),
                            },
                        );
                        const reply = await response.text();
                        if (reply == "clear") {
                            window.clearOutput();
                            return;
                        }
                        if (reply.length > 0) {
                            printToPage(reply);
                        }
                    } catch (err) {
                        console.log(`Could not reach server: ${err}`);
                    }
                }
            }

            // Event listener
            output.addEventListener("outputUpdated", async () => {
                console.log("outputUpdated event fire");
                await handleOutputUpdate();
            });

            // Ensure the DOM is fully loaded before attaching listeners
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", () => {
                    // Call printToPage when the DOM is ready
                    console.log("DOM listening for events");
                });
            } else {
                // If the DOM is already loaded, call printToPage immediately
                console.log("DOM already listening");
            }

            async function sleep(ms) {
                return new Promise((resolve) => setTimeout(resolve, ms));
            }
        </script>
    </body>
</html>
