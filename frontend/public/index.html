<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Welcome</title>
        <style>
            :root {
                --bg-color: #1e1e1e;
                --text-color: #e0e0e0;
                --input-bg: #333;
                --input-text: #e0e0e0;
                --button-bg: #444;
                --button-text: #e0e0e0;
                --output-bg: #2d2d2d;
                --output-border: #444;
            }
            .light-mode {
                --bg-color: #ffffff;
                --text-color: #333;
                --input-bg: #f0f0f0;
                --input-text: #333;
                --button-bg: #e0e0e0;
                --button-text: #333;
                --output-bg: #f9f9f9;
                --output-border: #ccc;
            }
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
                background-color: var(--bg-color);
                color: var(--text-color);
                transition:
                    background-color 0.3s,
                    color 0.3s;
            }
            #output {
                width: 100%;
                height: 33vh;
                border: 1px solid var(--output-border);
                padding: 10px;
                box-sizing: border-box;
                overflow-y: auto;
                white-space: pre-wrap;
                background-color: var(--output-bg);
                color: var(--text-color);
                margin-bottom: 10px;
            }
            #inputContainer {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            #inputField {
                width: 100%;
                padding: 8px;
                background-color: var(--input-bg);
                color: var(--input-text);
                border: 1px solid var(--output-border);
                box-sizing: border-box;
            }
            #submitButton {
                padding: 8px 15px;
                background-color: var(--button-bg);
                color: var(--button-text);
                border: 1px solid var(--output-border);
                cursor: pointer;
                align-self: flex-start;
            }
            #themeToggle {
                padding: 8px 15px;
                background-color: var(--button-bg);
                color: var(--button-text);
                border: 1px solid var(--output-border);
                cursor: pointer;
            }
            #themeToggle {
                position: fixed;
                bottom: 20px;
                right: 20px;
            }
        </style>
    </head>
    <body>
        <h1>Denethor</h1>
        <p>Your online CLI platform</p>
        <p id="userField">Guest</p>
        <p id="activeApp">App: Console</p>
        <div id="output"></div>
        <div id="inputContainer">
            <input type="text" id="inputField" placeholder="Enter text here" />
            <button id="submitButton">Submit</button>
        </div>
        <button id="themeToggle">Toggle Light/Dark</button>

        <script type="module" src="index.js"></script>
    </body>
</html>
